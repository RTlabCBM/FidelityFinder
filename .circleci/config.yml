# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/configuration-reference/#jobs
jobs:
  say-hello:
    # Specify the execution environment. You can specify an image from Docker Hub or use one of our convenience images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/configuration-reference/#executor-job
    docker:
      - image: cimg/base:stable
    # Add steps to the job
    # See: https://circleci.com/docs/configuration-reference/#steps
    steps:
      - checkout
      - run:
          name: "Say hello"
          command: "echo Hello, World!"
  run-test:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Install Java
          command: |
            sudo apt-get update
            sudo apt-get install -y openjdk-11-jdk
      - run:
          name: Install nextflow
          command: |
            echo Install nextflow
            curl -fsSL get.nextflow.io | bash
      - run:
          name: Install conda
          command: |
            mkdir -p ~/miniconda3
            wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O ~/miniconda3/miniconda.sh
            bash ~/miniconda3/miniconda.sh -b -u -p ~/miniconda3
            rm -rf ~/miniconda3/miniconda.sh
            echo $PATH
            source ~/.bashrc
            source /home/circleci/miniconda3/etc/profile.d/conda.sh
            conda activate nombre_del_entorno_conda
            echo $PATH
            conda env list
      - setup_remote_docker:
          version: 20.10.14       
      - run:
          name: "Run test"
          command: |
            #docker pull rtlabcbm/fidelityfinder_img:latest
            ./nextflow run main.nf -profile conda,test_profile
      - store_test_results:
          path: /home/circleci/project

            
# Orchestrate jobs using workflows
# See: https://circleci.com/docs/configuration-reference/#workflows
workflows:
  say-hello-workflow:
    jobs:
      - say-hello
      - run-test
